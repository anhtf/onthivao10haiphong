version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: onthivao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onthivao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onthivao_secret}
      POSTGRES_DB: ${POSTGRES_DB:-onthivao10haiphong}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-onthivao}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onthivao_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onthivao}:${POSTGRES_PASSWORD:-onthivao_secret}@postgres:5432/${POSTGRES_DB:-onthivao10haiphong}?schema=public
    ports:
      - '3000:3000'
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onthivao_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
